<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 原理架构图</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #1a1a1a;
      background-image: radial-gradient(circle, #2c2c2c 1px, transparent 1px);
      background-size: 30px 30px;
      font-family: 'Noto Sans SC', sans-serif;
      color: #ffffff;
    }

    .chalk-text {
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
    }

    .module-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-width: 100px;
    }

    .arrow-line {
      height: 2px;
      background: rgba(255, 255, 255, 0.2);
      position: relative;
      flex-grow: 1;
      margin: 0 15px;
      top: -15px;
    }

    .arrow-line::after {
      content: '';
      position: absolute;
      right: 0;
      top: -4px;
      border-left: 6px solid rgba(255, 255, 255, 0.2);
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
    }
  </style>
</head>

<body class="p-4 md:p-12 flex items-center justify-center min-h-screen">

  <div
    class="max-w-6xl w-full border-4 border-white/20 p-8 md:p-16 relative bg-[#121212]/90 rounded-xl shadow-2xl overflow-hidden">

    <h1 class="text-3xl md:text-5xl font-bold text-center mb-16 chalk-text">
      一次看懂 <span class="text-red-500">OpenClaw</span> 是怎么自动干活的
    </h1>

    <div class="flex flex-col md:flex-row gap-8">

      <div
        class="md:w-1/4 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r-2 border-white/20 pb-8 md:pb-0 md:pr-8">
        <div class="text-red-500 mb-6">
          <i data-lucide="shell" size="120" stroke-width="1.5"></i>
        </div>
        <div class="text-center">
          <h2 class="text-3xl font-bold tracking-tighter">OpenClaw</h2>
          <p class="text-xl text-gray-400 mt-2">AI私人助理</p>
        </div>
      </div>

      <div class="md:w-3/4 flex flex-col justify-between py-4 pl-0 md:pl-12">

        <div class="flex items-center justify-between mb-20">
          <div class="module-card">
            <i data-lucide="door-open" class="text-white" size="48"></i>
            <span class="text-lg font-medium">Gateway</span>
          </div>
          <div class="arrow-line"></div>
          <div class="module-card">
            <i data-lucide="bot" class="text-white" size="48"></i>
            <span class="text-lg font-medium">Agent</span>
          </div>
          <div class="arrow-line"></div>
          <div class="module-card text-yellow-500">
            <i data-lucide="briefcase" size="48"></i>
            <span class="text-lg font-medium">Skills</span>
          </div>
          <div class="arrow-line"></div>
          <div class="module-card text-green-500">
            <i data-lucide="waves" size="48"></i>
            <span class="text-lg font-medium">Channels</span>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="module-card text-emerald-400">
            <i data-lucide="network" size="48"></i>
            <span class="text-lg font-medium">Nodes</span>
          </div>
          <div class="arrow-line"></div>
          <div class="module-card text-purple-400">
            <i data-lucide="brain-circuit" size="48"></i>
            <span class="text-lg font-medium">Memory</span>
          </div>
          <div class="arrow-line"></div>
          <div class="module-card text-pink-400">
            <i data-lucide="activity" size="48"></i>
            <span class="text-lg font-medium">Heartbeat</span>
          </div>
          <div class="arrow-line"></div>
          <div class="module-card text-purple-600">
            <i data-lucide="clock" size="48"></i>
            <span class="text-lg font-medium">Cron</span>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-20 pt-8 border-t border-white/10 text-center">
      <p class="text-2xl md:text-3xl">
        <span class="text-yellow-500 font-bold">主动执行任务原理：</span>
        <span class="font-light tracking-[0.2em] text-gray-300">多模块协同响应</span>
      </p>
    </div>
  </div>

  <script>
    // 初始化 Lucide 图标
    lucide.createIcons();
  </script>
</body>

</html>
